<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="安全、离线优先的 HTTP 接口测试工具" />
    <meta name="theme-color" content="#1a1d27" />

    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <link rel="icon" type="image/png" href="/assets/favicon.png" sizes="32x32" />
    <link rel="apple-touch-icon" href="/assets/icons/icon-192.png" />

    <link rel="stylesheet" href="/src/styles/tokens.css" />
    <link rel="stylesheet" href="/src/styles/base.css" />
    <link rel="stylesheet" href="/src/styles/layout.css" />
    <link rel="stylesheet" href="/src/styles/themes/light.css" />
    <link rel="stylesheet" href="/src/styles/themes/dark.css" />

    <script>
      (function () {
        var t = localStorage.getItem('theme') || 'light';
        document.documentElement.dataset.theme = t;
      })();
    </script>

    <script type="importmap">
      {
        "imports": {
          "@codemirror/state": "https://esm.sh/@codemirror/state@6",
          "@codemirror/view": "https://esm.sh/@codemirror/view@6?external=@codemirror/state",
          "@codemirror/language": "https://esm.sh/@codemirror/language@6?external=@codemirror/state,@codemirror/view,@lezer/common,@lezer/highlight,@lezer/lr",
          "@codemirror/commands": "https://esm.sh/@codemirror/commands@6?external=@codemirror/state,@codemirror/view,@codemirror/language",
          "@codemirror/search": "https://esm.sh/@codemirror/search@6?external=@codemirror/state,@codemirror/view,@codemirror/language",
          "@codemirror/autocomplete": "https://esm.sh/@codemirror/autocomplete@6?external=@codemirror/state,@codemirror/view,@codemirror/language",
          "@codemirror/lint": "https://esm.sh/@codemirror/lint@6?external=@codemirror/state,@codemirror/view",
          "@codemirror/lang-json": "https://esm.sh/@codemirror/lang-json@6?external=@codemirror/state,@codemirror/language,@lezer/common,@lezer/highlight,@lezer/lr",
          "@codemirror/theme-one-dark": "https://esm.sh/@codemirror/theme-one-dark@6?external=@codemirror/state,@codemirror/view",
          "@lezer/common": "https://esm.sh/@lezer/common",
          "@lezer/highlight": "https://esm.sh/@lezer/highlight?external=@lezer/common",
          "@lezer/lr": "https://esm.sh/@lezer/lr?external=@lezer/common"
        }
      }
    </script>

    <title>Hello API</title>
  </head>
  <body>
    <app-shell></app-shell>

    <script type="module" src="/src/app.js"></script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
